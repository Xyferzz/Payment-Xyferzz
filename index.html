<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Xyferzz Neo Universe</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:
radial-gradient(circle at top,#220033 0%,#090012 45%,#020003 100%);
min-height:100vh;
overflow-x:hidden;
color:white;
padding:25px 15px;
position:relative;
}

/* BACKGROUND GRID */

.grid{
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
background-size:35px 35px;
z-index:0;
mask-image:linear-gradient(to bottom,transparent,black,black,transparent);
}

/* FLOATING LIGHT */

.light{
position:fixed;
border-radius:50%;
filter:blur(80px);
opacity:.4;
z-index:0;
animation:float 10s linear infinite;
}

.light:nth-child(2){
width:220px;
height:220px;
background:#7e22ce;
top:-50px;
left:-50px;
}

.light:nth-child(3){
width:260px;
height:260px;
background:#2563eb;
bottom:-100px;
right:-50px;
animation-duration:15s;
}

@keyframes float{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(20px);
}
100%{
transform:translateY(0px);
}
}

/* CONTAINER */

.container{
position:relative;
z-index:5;
max-width:420px;
margin:auto;
}

/* TOP CARD */

.hero{
position:relative;
overflow:hidden;

background:
linear-gradient(
145deg,
rgba(255,255,255,.08),
rgba(255,255,255,.03)
);

border:1px solid rgba(255,255,255,.08);

border-radius:35px;

padding:28px;

backdrop-filter:blur(20px);

box-shadow:
0 0 30px rgba(168,85,247,.2),
0 0 60px rgba(37,99,235,.1);
}

/* GLOW */

.hero::before{
content:"";
position:absolute;
width:160px;
height:160px;
background:#9333ea;
filter:blur(90px);
top:-50px;
right:-50px;
opacity:.35;
}

/* PROFILE */

.profile-wrap{
position:relative;
width:130px;
margin:auto;
}

.ring{
position:absolute;
inset:-10px;
border-radius:50%;
border:2px dashed rgba(216,180,254,.4);
animation:spin 8s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.profile{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
display:block;
border:4px solid rgba(255,255,255,.15);

box-shadow:
0 0 25px #9333ea,
0 0 60px rgba(147,51,234,.5);
}

/* TITLE */

.title{
margin-top:22px;
font-size:30px;
font-weight:900;
text-align:center;

background:
linear-gradient(
90deg,
#fff,
#d8b4fe,
#60a5fa
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.desc{
margin-top:10px;
font-size:11px;
text-align:center;
color:#d1d5db;
line-height:1.7;
}

/* STATUS */

.status{
margin-top:18px;

display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
}

.badge{
padding:10px 14px;
border-radius:999px;
font-size:11px;
font-weight:700;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(10px);
}

/* CARD */

.card{
margin-top:20px;

background:
linear-gradient(
145deg,
rgba(255,255,255,.06),
rgba(255,255,255,.03)
);

border:1px solid rgba(255,255,255,.08);

border-radius:28px;

padding:18px;

backdrop-filter:blur(18px);

box-shadow:
0 0 25px rgba(0,0,0,.25);
}

.card-title{
display:flex;
align-items:center;
gap:10px;

font-size:14px;
font-weight:700;
color:#e9d5ff;

margin-bottom:18px;
}

/* MUSIC */

.music-btn{
width:100%;
padding:16px;

border:none;
border-radius:18px;

font-size:13px;
font-weight:700;

color:white;

cursor:pointer;

background:
linear-gradient(
135deg,
#7e22ce,
#2563eb
);

transition:.3s;
}

.music-btn:hover{
transform:scale(1.03);
}

/* VISUALIZER */

.visualizer{
margin-top:18px;
display:flex;
justify-content:center;
align-items:flex-end;
gap:4px;
height:45px;
}

.visualizer span{
width:4px;
height:8px;
border-radius:20px;

background:
linear-gradient(
to top,
#2563eb,
#60a5fa,
#d8b4fe
);

box-shadow:
0 0 10px #60a5fa,
0 0 20px #9333ea;

animation:music 1s infinite ease-in-out;
animation-play-state:paused;
}

/* pas musik nyala */
.visualizer.playing span{
animation-play-state:running;
}

/* RANDOM DELAY */

.visualizer span:nth-child(1){animation-delay:.1s;}
.visualizer span:nth-child(2){animation-delay:.7s;}
.visualizer span:nth-child(3){animation-delay:.2s;}
.visualizer span:nth-child(4){animation-delay:.9s;}
.visualizer span:nth-child(5){animation-delay:.4s;}
.visualizer span:nth-child(6){animation-delay:.6s;}
.visualizer span:nth-child(7){animation-delay:.3s;}
.visualizer span:nth-child(8){animation-delay:.8s;}
.visualizer span:nth-child(9){animation-delay:.5s;}
.visualizer span:nth-child(10){animation-delay:.2s;}
.visualizer span:nth-child(11){animation-delay:.7s;}
.visualizer span:nth-child(12){animation-delay:.1s;}
.visualizer span:nth-child(13){animation-delay:.9s;}
.visualizer span:nth-child(14){animation-delay:.4s;}
.visualizer span:nth-child(15){animation-delay:.6s;}
.visualizer span:nth-child(16){animation-delay:.3s;}

/* GERAK */

@keyframes music{

0%,100%{
height:6px;
opacity:.4;
transform:translateY(0);
}

20%{
height:18px;
opacity:.7;
}

40%{
height:38px;
opacity:1;
}

60%{
height:14px;
opacity:.8;
}

80%{
height:28px;
opacity:1;
}
}

/* PAYMENT */

.pay-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.pay-btn{
padding:18px;
border:none;
border-radius:22px;

background:
linear-gradient(
145deg,
rgba(255,255,255,.08),
rgba(255,255,255,.03)
);

border:1px solid rgba(255,255,255,.08);

color:white;

cursor:pointer;

font-weight:700;

transition:.3s;
}

.pay-btn:hover{
transform:translateY(-5px);
box-shadow:
0 0 20px rgba(168,85,247,.25);
}

.pay-btn span{
display:block;
font-size:25px;
margin-bottom:10px;
}

/* RESULT */

.result{
display:none;
margin-top:16px;

padding:16px;
border-radius:18px;

background:rgba(0,0,0,.25);

border:1px solid rgba(255,255,255,.08);

text-align:center;

animation:fade .4s ease;
}

.result img{
width:210px;
border-radius:16px;
margin-top:15px;

border:2px solid rgba(255,255,255,.1);
}

.copy-btn{
margin-top:14px;
padding:12px 18px;

border:none;
border-radius:14px;

background:#9333ea;
color:white;

cursor:pointer;
font-weight:700;
}

/* SOCIAL */

.socials{
display:flex;
flex-direction:column;
gap:12px;
}

.social-btn{
padding:15px;

border-radius:18px;

background:
linear-gradient(
145deg,
rgba(255,255,255,.06),
rgba(255,255,255,.03)
);

border:1px solid rgba(255,255,255,.08);

color:white;

font-weight:700;

cursor:pointer;

transition:.3s;
}

.social-btn:hover{
transform:translateX(5px);
}

/* FOOTER */

.footer{
margin-top:22px;
text-align:center;
font-size:11px;
color:#9ca3af;
line-height:1.8;
}

/* ANIMATION */

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>
<body>

<div class="grid"></div>
<div class="light"></div>
<div class="light"></div>

<div class="container">

<!-- HERO -->

<div class="hero">

<div class="profile-wrap">
<div class="ring"></div>

<img
src="https://files.catbox.moe/z051er.png"
class="profile">
</div>

<div class="title">
XYFERZZ MARKET
</div>

<div class="desc">
「 It all starts from yourself, not from them.  」<br>
berubah menjadi lebih baik
</div>

<div class="status">
<div class="badge">Terpercaya</div>
<div class="badge">Fast Respon</div>
<div class="badge">Frofesional Service</div>
</div>

</div>

<!-- MUSIC -->

<div class="card">

<div class="card-title">
🎵 Music System
</div>

<button class="music-btn" onclick="toggleMusic()" id="musicBtn">
▶ PLAY MUSIC
</button>

<audio id="music" loop>
<source src="https://files.catbox.moe/fbv7ea.m4a">
</audio>

<div class="visualizer" id="visualizer">

<span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span>
<span></span><span></span><span></span><span></span>

</div>

</div>

<!-- PAYMENT -->

<div class="card">

<div class="card-title">
💸 Payment Gateway
</div>

<div class="pay-grid">

<button class="pay-btn" onclick="showData('DANA','083849483384','🔵')">
<span>🔵</span>
DANA
</button>

<button class="pay-btn" onclick="showData('GOPAY','083849483384','🟢')">
<span>🟢</span>
GOPAY
</button>

<button class="pay-btn" onclick="showQR()">
<span>📄</span>
QRIS
</button>

<button class="pay-btn" onclick="showData('OVO','Belum tersedia','🟣')">
<span>🟣</span>
OVO
</button>

</div>

<div class="result" id="result"></div>

</div>

<!-- SOCIAL -->

<div class="card">

<div class="card-title">
🌐 Social Portal
</div>

<div class="socials">

<button class="social-btn"
onclick="openLink('https://tiktok.com/@nokii_clipper.com')">
Tiktok
</button>

<button class="social-btn"
onclick="openLink('https://instagram.com')">
Instagram
</button>

<button class="social-btn"
onclick="openLink('https://t.me/XyferzzNM')">
Telegram
</button>

<button class="social-btn"
onclick="openLink('https://whatsapp.com/channel/0029VbBGfoNCHDybbXFUBN3B')">
WhatsApp Channel
</button>

</div>

</div>

<div class="footer">
Xyferzz Not Mods © 2020<br>
© 2020 Xyferzz Market — All Rights Reserved
</div>

</div>

<script>

/* MUSIC */

const music =
document.getElementById("music");

const musicBtn =
document.getElementById("musicBtn");

const visualizer =
document.getElementById("visualizer");

let playing = false;

function toggleMusic(){

if(playing){

music.pause();

musicBtn.innerHTML =
"▶ PLAY MUSIC";

visualizer.classList.remove("playing");

}else{

music.play();

musicBtn.innerHTML =
"⏸ PAUSE MUSIC";

visualizer.classList.add("playing");
}

playing = !playing;
}

/* PAYMENT */

const result =
document.getElementById("result");

function showData(name,number,emoji){

result.style.display = "block";

result.innerHTML = `
<h3>${emoji} ${name}</h3>

<br>

<p>${number}</p>

<button class="copy-btn"
onclick="copyText('${number}')">
COPY
</button>
`;
}

function showQR(){

result.style.display = "block";

result.innerHTML = `
<h3>📄 QR PAYMENT</h3>

<img src="https://files.catbox.moe/a8y4ih.jpg">

<button class="copy-btn"
onclick="window.open('https://files.catbox.moe/a8y4ih.jpg')">
OPEN QR
</button>
`;
}

function copyText(text){

navigator.clipboard.writeText(text);

alert("Copied!");
}

/* LINK */

function openLink(link){
window.open(link,"_blank");
}

</script>

</body>
</html>
